<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Calling Agent — Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,450;0,14..32,500;0,14..32,600;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { overflow: hidden; }
    input, textarea, select, button { font-family: inherit; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.5); }

    /* Keyframe animations used by the console components */
    @keyframes pulseRing  { 0%   { transform: scale(1);   opacity: 0.6; }
                            100% { transform: scale(2.2);  opacity: 0;   } }
    @keyframes blink      { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes spin       { to { transform: rotate(360deg); } }
    @keyframes orbFloat   { 0%, 100% { transform: translateY(0px); }
                            50%       { transform: translateY(-6px); } }
    @keyframes ringPulse  { 0%   { transform: scale(1);   opacity: 0.4; }
                            100% { transform: scale(1.5);  opacity: 0;   } }
    @keyframes typingDot  { 0%, 60%, 100% { transform: translateY(0);    opacity: 0.4; }
                            30%            { transform: translateY(-4px); opacity: 1;   } }
    @keyframes fadeIn     { from { opacity: 0; }
                            to   { opacity: 1; } }
    @keyframes modalIn    { from { opacity: 0; transform: translateY(8px) scale(0.98); }
                            to   { opacity: 1; transform: translateY(0)   scale(1);    } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone (transforms JSX at runtime) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- LiveKit client (UMD; exposes window.LivekitClient). Used by CallRoomScreen
       to subscribe to a live call as a hidden monitor and stream per-turn
       STT/LLM/TTS metric events into the chat. Match the version in
       frontend/package.json so behaviour stays consistent across surfaces. -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.17.3/dist/livekit-client.umd.min.js"></script>

  <!-- 1. Design tokens (plain JS — sets window.ConsoleTokens) -->
  <script src="/console/tokens.js"></script>

  <!-- 2. Shared primitives (JSX — exports Ic, Btn, Card, Table, Sidebar, Topbar … to window) -->
  <script type="text/babel" data-presets="react" src="/console/shared.jsx"></script>

  <!-- 3. Call screens (JSX — exports LiveCallsScreen, CallRoomScreen, AgentsScreen …) -->
  <script type="text/babel" data-presets="react" src="/console/screens-calls.jsx"></script>

  <!-- 4. Rest screens (JSX — exports AgentBuilderScreen, HistoryScreen, Analytics, Settings, Modals) -->
  <script type="text/babel" data-presets="react" src="/console/screens-rest.jsx"></script>

  <!-- 5. App root — real API wiring + ReactDOM.createRoot mount -->
  <script type="text/babel" data-presets="react" src="/console/app.jsx"></script>
</body>
</html>
