# LiveKit Server Configuration — Self-Hosted
# Env vars (${VAR}) are substituted by LiveKit at startup

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  udp_port: 7882
  # Auto-detect VPS public IP for ICE candidates
  use_external_ip: true
  interfaces:
    excludes:
      - lo
      - docker0

# API keys — values come from .env via docker-compose
keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

# Built-in TURN server (helps clients behind strict NAT/firewalls)
turn:
  enabled: true
  domain: ${LIVEKIT_DOMAIN}
  tls_port: 5349
  udp_port: 3478
  # Caddy terminates TLS; LiveKit receives plain traffic on 5349
  external_tls: true

# Redis for distributed state (important even on single node — prevents issues)
redis:
  address: redis:6379

logging:
  level: info
  pion_level: error

# Room defaults
room:
  empty_timeout: 300        # close room after 5 min empty
  departure_timeout: 20
  max_participants: 50
