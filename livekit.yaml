# LiveKit Server Configuration — Self-Hosted
# NOTE: LiveKit does NOT expand ${VAR} in YAML files.
# Keys are passed via LIVEKIT_KEYS env var in docker-compose.yml.
# turn.domain is injected via a sed substitution at container startup.

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
  node_ip: "161.118.172.34"
  interfaces:
    excludes:
      - lo
      - docker0
      - br-*
      - veth*

# Built-in TURN server
turn:
  enabled: true
  domain: LIVEKIT_DOMAIN_PLACEHOLDER
  tls_port: 5349
  udp_port: 3478
  external_tls: true

redis:
  address: redis:6379

logging:
  level: info
  pion_level: error

room:
  empty_timeout: 300
  departure_timeout: 20
  max_participants: 50
